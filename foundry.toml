[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "muri-artifacts/=lib/muri-artifacts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/"
]
optimizer = true
optimizer_runs = 200
via_ir = true
gas_limit = 9999999999